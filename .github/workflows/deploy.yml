name: 'Terraform Deploy to Dev'

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'frontend/**'
      - 'backend/**'
  pull_request:
    paths-ignore:
      - 'frontend/**'
      - 'backend/**'
  workflow_dispatch:
    inputs:
      plan_only:
        description: 'Run terraform plan only (dry run — no apply)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      enable_cognito:
        description: 'Enable Cognito (overrides repo var)'
        required: false
        default: ''
      enable_chatbot:
        description: 'Enable App Runner chatbot (overrides repo var)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: dev

    env:
      AWS_ROLE_ARN: "arn:aws:iam::320042238431:role/GitHub-Role"
      AWS_REGION: "us-east-1"
      TF_VERSION: "1.9.0"
      # Dev-account-only state bucket (320042238431) — no cross-account dependency
      TF_STATE_BUCKET: "appsys-finx-dev-terraform-state"
      # ── Chatbot feature flags ──
      TF_VAR_enable_cognito: ${{ github.event.inputs.enable_cognito || vars.ENABLE_COGNITO || 'false' }}
      TF_VAR_enable_chatbot: ${{ github.event.inputs.enable_chatbot || vars.ENABLE_CHATBOT || 'false' }}
      TF_VAR_chatbot_image_tag: ${{ vars.CHATBOT_IMAGE_TAG || 'latest' }}
      PLAN_ONLY: ${{ github.event.inputs.plan_only || 'false' }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Bootstrap Dev State Bucket (idempotent)
      run: |
        # Create state bucket in Dev account (320042238431) if it doesn't exist
        if aws s3api head-bucket --bucket "${{ env.TF_STATE_BUCKET }}" 2>/dev/null; then
          echo "✅ State bucket already exists: ${{ env.TF_STATE_BUCKET }}"
        else
          echo "Creating state bucket: ${{ env.TF_STATE_BUCKET }}"
          aws s3api create-bucket \
            --bucket "${{ env.TF_STATE_BUCKET }}" \
            --region "${{ env.AWS_REGION }}"
          aws s3api put-bucket-versioning \
            --bucket "${{ env.TF_STATE_BUCKET }}" \
            --versioning-configuration Status=Enabled
          aws s3api put-public-access-block \
            --bucket "${{ env.TF_STATE_BUCKET }}" \
            --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          aws s3api put-bucket-encryption \
            --bucket "${{ env.TF_STATE_BUCKET }}" \
            --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          echo "✅ State bucket created and secured"
        fi

    - name: Upload Lambda artifacts to Dev state bucket
      run: |
        ARTIFACTS_DIR=".lambda_artifacts/appsys-invi-iac/artifacts"
        echo "Uploading Lambda artifacts to s3://${{ env.TF_STATE_BUCKET }}/lambda-artifacts/"
        aws s3 cp "${ARTIFACTS_DIR}/email-attachment-parser.zip" \
          "s3://${{ env.TF_STATE_BUCKET }}/lambda-artifacts/email-attachment-parser.zip"
        aws s3 cp "${ARTIFACTS_DIR}/Nova-Extractor-Lambda.zip" \
          "s3://${{ env.TF_STATE_BUCKET }}/lambda-artifacts/Nova-Extractor-Lambda.zip"
        aws s3 cp "${ARTIFACTS_DIR}/invoice-audit-writer-lamdba.zip" \
          "s3://${{ env.TF_STATE_BUCKET }}/lambda-artifacts/invoice-audit-writer-lamdba.zip"
        echo "✅ Lambda artifacts uploaded"
        aws s3 ls "s3://${{ env.TF_STATE_BUCKET }}/lambda-artifacts/"

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      id: init
      run: |
        terraform init \
          -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
          -backend-config="key=dev/terraform.tfstate" \
          -backend-config="region=${{ env.AWS_REGION }}" \
          -backend-config="encrypt=true"

    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color

    - name: Terraform Plan
      id: plan
      if: github.event_name == 'pull_request'
      run: terraform plan -no-color -out=tfplan
      continue-on-error: true

    - name: Show plan summary
      id: plan_summary
      if: github.event_name == 'pull_request'
      run: |
        terraform show -no-color tfplan | grep -E "Plan:|No changes" | head -1 > plan_summary.txt
        echo "summary=$(cat plan_summary.txt)" >> $GITHUB_OUTPUT
      continue-on-error: true

    - name: Update Pull Request
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      env:
        PLAN: "${{ steps.plan.outputs.stdout }}"
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const summary = `${{ steps.plan_summary.outputs.summary }}` || 'No plan output';
          const output = `## Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

          **Summary:** ${summary}

          <details><summary>Full Plan Output</summary>

          \`\`\`terraform
          ${process.env.PLAN}
          \`\`\`

          </details>

          > Chatbot enabled: \`${{ env.TF_VAR_enable_chatbot }}\` | Cognito enabled: \`${{ env.TF_VAR_enable_cognito }}\`
          `;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })

    - name: Terraform Plan Status Check
      if: steps.plan.outcome == 'failure'
      run: exit 1

    - name: Terraform Apply
      if: |
        (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.plan_only == 'false')
      run: terraform apply -auto-approve

    - name: Terraform Plan (dry-run mode)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.plan_only != 'false'
      run: |
        echo "### 🔍 DRY RUN — Terraform Plan Only" >> $GITHUB_STEP_SUMMARY
        terraform plan -no-color -detailed-exitcode 2>&1 | tee tf_plan_output.txt || true
        echo "\`\`\`terraform" >> $GITHUB_STEP_SUMMARY
        cat tf_plan_output.txt >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "✅ Plan complete — no changes applied."

    - name: Summary
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        echo "### ✅ Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
        echo "- Region: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
        echo "- State bucket (Dev account): ${{ env.TF_STATE_BUCKET }}" >> $GITHUB_STEP_SUMMARY
        echo "- Chatbot enabled: ${{ env.TF_VAR_enable_chatbot }}" >> $GITHUB_STEP_SUMMARY
        echo "- Cognito enabled: ${{ env.TF_VAR_enable_cognito }}" >> $GITHUB_STEP_SUMMARY
