name: 'Frontend Deploy to Dev'

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: 'Build and Push'
    runs-on: ubuntu-latest
    environment: dev

    env:
      AWS_ROLE_ARN: "arn:aws:iam::320042238431:role/GitHub-Role"
      AWS_REGION: "us-east-1"
      ECR_REPOSITORY: "finx-chatbot-ui"
      SERVICE_NAME: "finx-chatbot-ui"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./frontend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Update App Runner Service
      run: |
        SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='${{ env.SERVICE_NAME }}'].ServiceArn" --output text)
        if [ -n "$SERVICE_ARN" ] && [ "$SERVICE_ARN" != "None" ]; then
          echo "Updating App Runner service: $SERVICE_ARN"
          aws apprunner update-service \
            --service-arn "$SERVICE_ARN" \
            --source-configuration "{ \"ImageRepository\": { \"ImageIdentifier\": \"${{ steps.build-image.outputs.image }}\", \"ImageRepositoryType\": \"ECR\" } }"
        else
          echo "App Runner service '${{ env.SERVICE_NAME }}' not found. This is expected if Terraform hasn't created it yet. Skipping update."
        fi
